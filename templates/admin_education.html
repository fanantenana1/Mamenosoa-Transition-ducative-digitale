<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digiscool – Admin · Éducation</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root {
      --bg:        #b8c8e8;
      --nav-bg:    #1a1a2e;
      --accent:    #1a6bff;
      --table-bg:  #ccd9ee;
      --row-line:  rgba(30,58,95,0.18);
      --font-ui:   'Segoe UI', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: var(--font-ui);
      background-color: var(--bg);
      background-image: url('../static/image/molecule.png');
      background-repeat: no-repeat;
      background-position: center 160px;
      background-size: 520px auto;
      min-height: 100vh;
    }

    /* ── decorative molecule bottom-left ── */
    body::after {
      content:'';
      position:fixed; bottom:0; left:0;
      width:220px; height:220px;
      background:url('../static/image/molecule_bas.png') no-repeat left bottom / contain;
      pointer-events:none; z-index:0;
    }

    /* ─────────── NAVBAR ─────────── */
    .ds-nav {
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 28px;
      height: 66px;
      position: sticky;
      top: 0; z-index: 200;
      border-bottom: 2px solid rgba(255,255,255,.06);
    }
    .ds-logo {
      display:flex; align-items:center; gap:10px;
      text-decoration:none; margin-right:16px; flex-shrink:0; margin-left:-22px;
    }
    .ds-logo img { height:44px; width:auto; border-radius:8px; object-fit:contain; }
    .ds-logo-name { font-weight:700; font-size:16px; color:#fff; line-height:1.2; }
    .nav-btn {
      background:none; border:none; color:#fff;
      font-size:15px; font-weight:500;
      padding:10px 24px; border-radius:10px;
      cursor:pointer; transition:background .18s; white-space:nowrap;
    }
    .nav-btn:hover  { background:rgba(255,255,255,.08); }
    .nav-btn.active { background:rgba(255,255,255,.13); }
    .nav-btn-accent {
      background:var(--accent); color:#fff;
      font-weight:600; margin-left:auto;
    }
    .nav-btn-accent:hover { background:#1558d6; }
    .notif-btn {
      background:none; border:none; cursor:pointer;
      color:#fff; font-size:20px; padding:8px 10px;
      position:relative; border-radius:8px;
      transition:background .18s;
    }
    .notif-btn:hover { background:rgba(255,255,255,.08); }
    .notif-badge {
      position:absolute; top:4px; right:4px;
      width:8px; height:8px; border-radius:50%;
      background:#ef4444; display:none;
    }
    .notif-badge.show { display:block; }

    /* ─────────── PAGE WRAPPER ─────────── */
    .edu-page {
      padding: 40px 48px 120px;
      max-width: 1380px;
      margin: 0 auto;
      position:relative; z-index:2;
    }

    /* ─────────── TOOLBAR (search + sort) ─────────── */
    .toolbar {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:20px;
      margin-bottom:28px;
    }
    .search-wrap {
      display:flex; align-items:center; gap:10px;
      background:#fff;
      border:1.5px solid #b0c0de;
      border-radius:8px;
      padding:10px 18px;
      width:560px;
      box-shadow:0 2px 8px rgba(0,0,50,.08);
    }
    .search-wrap input {
      border:none; outline:none;
      font-size:15px; color:#333;
      flex:1; background:transparent;
    }
    .search-wrap input::placeholder { color:#9aaac4; }
    .sort-btn {
      display:flex; align-items:center; gap:8px;
      background:#fff; border:1.5px solid #b0c0de;
      border-radius:8px; padding:10px 18px;
      font-size:14px; font-weight:600; color:#1e3a5f;
      cursor:pointer; transition:background .15s;
      white-space:nowrap;
      box-shadow:0 2px 8px rgba(0,0,50,.08);
    }
    .sort-btn:hover { background:#f0f4ff; }

    /* ─────────── TABLE CARD ─────────── */
    .table-card {
      background: var(--table-bg);
      border-radius: 14px;
      border: 1.5px solid rgba(30,58,95,0.15);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,50,.10);
    }

    /* Table header */
    .tbl-head {
      display:grid;
      grid-template-columns: 60px 120px 1fr 180px 230px 90px;
      padding: 14px 20px;
      border-bottom: 2px solid rgba(30,58,95,0.2);
      gap:8px;
    }
    .tbl-head-cell {
      font-size:14px; font-weight:700; color:#1a6bff;
      display:flex; align-items:center;
    }
    .tbl-head-cell.center { justify-content:center; }

    /* Table rows */
    .tbl-row {
      display:grid;
      grid-template-columns: 60px 120px 1fr 180px 230px 90px;
      padding: 0 20px;
      min-height: 88px;
      align-items:center;
      gap:8px;
      border-bottom: 1px solid var(--row-line);
      transition:background .15s;
    }
    .tbl-row:last-child { border-bottom:none; }
    .tbl-row:hover { background:rgba(255,255,255,0.35); }

    /* N° cell */
    .cell-num {
      font-size:28px; font-weight:800; color:#1e3a5f;
      display:flex; align-items:center; justify-content:center;
    }

    /* Video player cell */
    .cell-video {
      display:flex; align-items:center; justify-content:center;
    }
    .video-thumb {
      width:88px; height:56px;
      border:2.5px solid #1a1a2e;
      border-radius:8px;
      background:#e8edf5;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      transition:border-color .15s, box-shadow .15s;
      position:relative; overflow:hidden;
    }
    .video-thumb:hover { border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,107,255,.2); }
    .video-thumb .play-icon {
      width:0; height:0;
      border-top:12px solid transparent;
      border-bottom:12px solid transparent;
      border-left:20px solid #1a1a2e;
      margin-left:4px;
    }
    .video-thumb:hover .play-icon { border-left-color:var(--accent); }

    /* Title/desc cell */
    .cell-title { display:flex; flex-direction:column; justify-content:center; gap:4px; }
    .course-title { font-size:15px; font-weight:700; color:#1e3a5f; }
    .course-desc  { font-size:13px; color:#4b6789; }

    /* Doc cell */
    .cell-doc { display:flex; align-items:center; gap:6px; }
    .doc-status {
      display:flex; align-items:center; gap:6px;
      cursor:pointer;
    }
    .doc-status .status-icon { width:20px; height:20px; flex-shrink:0; }
    .doc-status .lbl {
      font-size:14px; font-weight:600;
      color:var(--accent); text-decoration:underline;
      text-underline-offset:2px;
    }
    .doc-status .lbl:hover { color:#0d4fd6; }

    /* Actions cell */
    .cell-actions {
      display:flex; align-items:center; justify-content:flex-end; gap:14px;
    }
    .act-btn {
      background:none; border:none; cursor:pointer;
      font-size:18px; padding:6px;
      border-radius:6px; transition:background .15s, color .15s;
    }
    .act-edit { color:#17a2b8; }
    .act-edit:hover { background:rgba(23,162,184,.12); }
    .act-del  { color:#dc3545; }
    .act-del:hover  { background:rgba(220,53,69,.12); }

    /* ─────────── ADD BUTTON ─────────── */
    .add-wrap {
      display:flex; justify-content:center; margin-top:32px;
    }
    .btn-add {
      background:var(--accent); color:#fff;
      font-size:16px; font-weight:600;
      border:none; border-radius:8px;
      padding:13px 52px; cursor:pointer;
      transition:background .18s, transform .1s;
      box-shadow:0 4px 16px rgba(26,107,255,.35);
    }
    .btn-add:hover   { background:#1558d6; }
    .btn-add:active  { transform:scale(0.98); }

    /* ─────────── MODAL ─────────── */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:1000;
      background:rgba(4,6,40,.78); backdrop-filter:blur(5px);
      align-items:center; justify-content:center; padding:16px;
    }
    .modal-overlay.active { display:flex; }
    .modal-box {
      background:#fff; border-radius:16px;
      padding:32px 28px; width:100%; max-width:540px;
      position:relative; box-shadow:0 24px 64px rgba(0,0,30,.5);
      max-height:90vh; overflow-y:auto;
    }
    .modal-title { font-size:20px; font-weight:700; color:#1e3a5f; margin-bottom:20px; }
    .modal-close {
      position:absolute; top:14px; right:18px;
      background:none; border:none; font-size:22px;
      color:#999; cursor:pointer;
    }
    .modal-close:hover { color:#333; }
    .modal-form-group { margin-bottom:16px; }
    .modal-form-group label { display:block; font-size:13px; font-weight:600; color:#1e3a5f; margin-bottom:6px; }
    .modal-form-group input,
    .modal-form-group textarea,
    .modal-form-group select {
      width:100%; border:1.5px solid #c8d5e8; border-radius:8px;
      padding:10px 14px; font-size:14px; color:#333; outline:none;
      font-family:var(--font-ui);
      transition:border-color .2s;
    }
    .modal-form-group input:focus,
    .modal-form-group textarea:focus { border-color:var(--accent); }
    .modal-form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .btn-modal-save {
      width:100%; background:var(--accent); color:#fff;
      font-size:15px; font-weight:600; border:none;
      border-radius:8px; padding:12px; cursor:pointer; margin-top:8px;
      transition:background .18s;
    }
    .btn-modal-save:hover { background:#1558d6; }

    /* ─────────── VIDEO VIEWER ─────────── */
    .video-modal-box {
      background:#111; border-radius:14px;
      padding:20px; width:100%; max-width:700px;
      position:relative;
    }
    .video-modal-box iframe {
      width:100%; aspect-ratio:16/9; border-radius:8px; border:none;
    }

    /* ─────────── TOAST ─────────── */
    .toast-bar {
      position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
      background:#1e3a5f; color:#fff; padding:12px 28px;
      border-radius:10px; font-size:14px; font-weight:600;
      z-index:2000; opacity:0; pointer-events:none;
      transition:opacity .3s;
      box-shadow:0 4px 20px rgba(0,0,50,.3);
    }
    .toast-bar.show { opacity:1; }

    /* ─────────── SORT DROPDOWN ─────────── */
    .sort-dropdown {
      position:relative; display:inline-block;
    }
    .sort-menu {
      display:none; position:absolute; right:0; top:calc(100% + 6px);
      background:#fff; border:1.5px solid #c8d5e8; border-radius:10px;
      box-shadow:0 8px 24px rgba(0,0,50,.13); min-width:170px; z-index:100;
      overflow:hidden;
    }
    .sort-menu.open { display:block; }
    .sort-menu-item {
      padding:10px 18px; font-size:14px; color:#1e3a5f;
      cursor:pointer; transition:background .14s; font-weight:500;
    }
    .sort-menu-item:hover { background:#f0f4ff; }
    .sort-menu-item.selected { color:var(--accent); font-weight:700; }

    @media(max-width:900px) {
      .edu-page { padding:24px 12px 100px; }
      .tbl-head,
      .tbl-row  { grid-template-columns:50px 90px 1fr 160px; }
      .tbl-head-cell:nth-child(5),
      .tbl-row > .cell-doc:nth-child(5),
      .tbl-head-cell:last-child,
      .tbl-row > .cell-actions { display:none; }
    }
  </style>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="ds-nav">
    <a href="dashboard.html" class="ds-logo">
      <img src="../static/image/Logo.png" alt="Digiscool logo"
           onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex'">
      <div id="logo-fb" style="display:none;width:44px;height:44px;border-radius:9px;
           background:linear-gradient(135deg,#a855f7,#3b82f6);align-items:center;
           justify-content:center;font-weight:800;font-size:17px;color:#fff;">DS</div>
      <div class="ds-logo-name">Digiscool</div>
    </a>
    <button class="nav-btn" onclick="setPage(this,'accueil')">Acceuil</button>
    <button class="nav-btn" onclick="setPage(this,'utilisateurs')">Utilisateurs</button>
    <button class="nav-btn active" onclick="setPage(this,'education')">Education</button>
    <button class="nav-btn" onclick="setPage(this,'test')">Test</button>
    <button class="notif-btn" title="Notifications">
      <i class="bi bi-bell"></i>
      <span class="notif-badge show" id="notif-dot"></span>
    </button>
    <button class="nav-btn nav-btn-accent" onclick="deconnect()">Déconnecté</button>
  </nav>

  <!-- ── MAIN ── -->
  <main class="edu-page">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACIAAAAiCAYAAAA6RwvCAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAOdEVYdFNvZnR3YXJlAEZpZ21hnrGWYwAAAYtJREFUeAHtlu9NwzAQxR+I72QDjgnoCB4hGxAmoBu0G8AGYYOyQbJBYYLCBGQDOJOz7PxRa8dO1Q/5SU9OIvvybMeXAxYulKuAvhmrYD2wSJ41rE9WLZqVFati/Z7QQYzOwrPzoh9WyVqzcpaS9k1MmH472BVLwsYJ/op2a45ROIYOqcwYE3oV8oBx5JjZIxKCXYkQE2NmtoiglCAlpqNgV/TUlo5CsKtBiMOctDUmUMjgd8STS6zKp/N1715JWyOeWtqVT+eb3v2dtB+953pWhOPoLPvkjG1EmahBgJExdJAV/D46wnASmttQI99OQIMOcO9p5Kt3n/XiehvRs3nEcF/NMoegnJjBKNjzH0t0PtpLgALTISTIRwXsqhCmkSI7/2Oy4pS/6CZi7IAM3V+6T1LSY3boFkqEBBDs92IKnhzdY6yvFesF7VaaLU1el2i2GJaF7stcmQxMc5khtB9xBTtzdwt0BadGxsxixiXzDEznMOMLYTEzDuFCzaSoAqMgtKdvUi27cHb+AMKDlRl+z9c8AAAAAElFTkSuQmCC"
             alt="search" style="width:22px;height:22px;opacity:.55;flex-shrink:0;"/>
        <input type="text" id="search-input" placeholder="Recherche ....."
               oninput="filterRows(this.value)"/>
      </div>
      <div class="sort-dropdown">
        <button class="sort-btn" onclick="toggleSort()" id="sort-btn-main">
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAOdEVYdFNvZnR3YXJlAEZpZ21hnrGWYwAAAHdJREFUeAHt1MENgCAMBdBvdDBHwUmomziKo7iJcihJgwgxaTn1JT8QDu2lBXCuEDgmYsrNiVAmi6s3kcWJo9pEFs9kk6YFfRufR9HgghsloL5cX++/1UZSjm7TjL4pZeWAT+L7nnJCAeG9yQRlZFk8CzD8TZ2NBwgTJ8tiLpnRAAAAAElFTkSuQmCC"

        </button>
        <div class="sort-menu" id="sort-menu">
          <div class="sort-menu-item selected" onclick="sortRows('num',this)">N° (défaut)</div>
          <div class="sort-menu-item" onclick="sortRows('title',this)">Titre A→Z</div>
          <div class="sort-menu-item" onclick="sortRows('titre-desc',this)">Titre Z→A</div>
        </div>
      </div>
    </div>

    <!-- Table card -->
    <div class="table-card">

      <!-- Header -->
      <div class="tbl-head">
        <div class="tbl-head-cell center">N°</div>
        <div class="tbl-head-cell center">Vidéos</div>
        <div class="tbl-head-cell">Titre et description</div>
        <div class="tbl-head-cell center">Document-Cours</div>
        <div class="tbl-head-cell center">Document-Exercice</div>

      <div id="rows-container">

    </div><!-- /table-card -->

    <!-- Add button -->
    <div class="add-wrap">
      <button class="btn-add" onclick="openAddModal()">
        <i class="bi bi-plus-lg" style="margin-right:8px;"></i>Ajouter
      </button>
    </div>

  </main>

  <!-- ══════════════ MODAL ADD / EDIT ══════════════ -->
  <div class="modal-overlay" id="modal-edit" onclick="handleOvClick(event,'modal-edit')">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal('modal-edit')">&times;</button>
      <div class="modal-title" id="modal-edit-title">Ajouter un cours</div>

      <div class="modal-form-group">
        <label>Titre du cours *</label>
        <input type="text" id="f-title" placeholder="ex : MOLECULE"/>
      </div>
      <div class="modal-form-group">
        <label>Description</label>
        <input type="text" id="f-desc" placeholder="ex : Réaction physique"/>
      </div>
      <div class="modal-form-row">
        <div class="modal-form-group">
          <label>Lien vidéo (YouTube embed)</label>
          <input type="url" id="f-video" placeholder="https://www.youtube.com/embed/…"/>
        </div>
        <div class="modal-form-group">
          <label>Document Cours</label>
          <select id="f-doc-cours">
            <option value="1">Disponible ✅</option>
            <option value="0">Non disponible ❌</option>
          </select>
        </div>
      </div>
      <div class="modal-form-group">
        <label>Document Exercice</label>
        <select id="f-doc-exo">
          <option value="1">Disponible ✅</option>
          <option value="0">Non disponible ❌</option>
        </select>
      </div>

      <button class="btn-modal-save" id="btn-modal-save" onclick="saveRow()">Enregistrer</button>
    </div>
  </div>

  <!-- ══════════════ MODAL VIDEO VIEWER ══════════════ -->
  <div class="modal-overlay" id="modal-video" onclick="handleOvClick(event,'modal-video')">
    <div class="video-modal-box">
      <button class="modal-close" style="color:#fff;position:absolute;top:10px;right:14px;"
              onclick="closeVideoModal()">&times;</button>
      <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-bar" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script>
  /* ── Sample data ── */
  let courses = [
    { id:1, title:"MOLECULE",      desc:"Réaction physique",  video:"https://www.youtube.com/embed/dQw4w9WgXcQ", docCours:1, docExo:0 },
    { id:2, title:"COMBISTION",    desc:"Réaction physique",  video:"",                                           docCours:1, docExo:1 },
    { id:3, title:"REACTION BILAN",desc:"Réaction physique",  video:"https://www.youtube.com/embed/dQw4w9WgXcQ", docCours:0, docExo:1 },
    { id:4, title:"TYPES",         desc:"Réaction physique",  video:"",                                           docCours:1, docExo:0 },
    { id:5, title:"TYPES",         desc:"Réaction physique",  video:"https://www.youtube.com/embed/dQw4w9WgXcQ", docCours:1, docExo:0 },
  ];
  let editingId = null;
  let nextId = 6;

  /* Status icons as inline SVG for crisp rendering */
  const ICON_OK  = `<svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="10" fill="#22c55e"/><path d="M6.5 11.5l3 3 6-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const ICON_NO  = `<svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="10" stroke="#374151" stroke-width="2"/><path d="M8 8l6 6M14 8l-6 6" stroke="#374151" stroke-width="2" stroke-linecap="round"/></svg>`;

  function statusIcon(v){ return v ? ICON_OK : ICON_NO; }

  function renderRows(data) {
    const container = document.getElementById('rows-container');
    container.innerHTML = data.map((c,i) => `
      <div class="tbl-row" data-id="${c.id}" data-title="${c.title.toLowerCase()}">
        <div class="cell-num">${i+1}</div>
        <div class="cell-video">
          <div class="video-thumb" onclick="playVideo('${c.video}',${c.id})" title="Lire la vidéo">
            <div class="play-icon"></div>
          </div>
        </div>
        <div class="cell-title">
          <div class="course-title">• ${c.title}</div>
          <div class="course-desc">• ${c.desc}</div>
        </div>
        <div class="cell-doc" style="justify-content:center;">
          <div class="doc-status" onclick="alert('Document cours : ' + (${c.docCours}?'Disponible':'Non disponible'))">
            <span class="status-icon">${statusIcon(c.docCours)}</span>
            <span class="lbl">Voire</span>
          </div>
        </div>
        <div class="cell-doc" style="justify-content:center;">
          <div class="doc-status" onclick="alert('Document exercice : ' + (${c.docExo}?'Disponible':'Non disponible'))">
            <span class="status-icon">${statusIcon(c.docExo)}</span>
            <span class="lbl">Voire</span>
          </div>
        </div>
        <div class="cell-actions">
          <button class="act-btn act-edit" onclick="openEditModal(${c.id})" title="Modifier"><i class="bi bi-pencil-fill"></i></button>
          <button class="act-btn act-del"  onclick="deleteRow(${c.id})"     title="Supprimer"><i class="bi bi-trash-fill"></i></button>
        </div>
      </div>
    `).join('');
  }

  renderRows(courses);

  /* ── Filter ── */
  function filterRows(q){
    const filtered = courses.filter(c =>
      c.title.toLowerCase().includes(q.toLowerCase()) ||
      c.desc.toLowerCase().includes(q.toLowerCase())
    );
    renderRows(filtered);
  }

  /* ── Sort ── */
  let sortMenuOpen = false;
  function toggleSort(){
    sortMenuOpen = !sortMenuOpen;
    document.getElementById('sort-menu').classList.toggle('open', sortMenuOpen);
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('.sort-dropdown')) {
      sortMenuOpen = false;
      document.getElementById('sort-menu').classList.remove('open');
    }
  });
  function sortRows(by, el) {
    document.querySelectorAll('.sort-menu-item').forEach(i=>i.classList.remove('selected'));
    el.classList.add('selected');
    toggleSort();
    const sorted = [...courses];
    if (by==='title')      sorted.sort((a,b)=>a.title.localeCompare(b.title));
    else if(by==='titre-desc') sorted.sort((a,b)=>b.title.localeCompare(a.title));
    renderRows(sorted);
  }

  /* ── Video modal ── */
  function playVideo(url, id){
    if(!url){ showToast('Aucune vidéo disponible pour ce cours.'); return; }
    document.getElementById('video-iframe').src = url;
    document.getElementById('modal-video').classList.add('active');
    document.body.style.overflow='hidden';
  }
  function closeVideoModal(){
    document.getElementById('video-iframe').src='';
    document.getElementById('modal-video').classList.remove('active');
    document.body.style.overflow='';
  }

  /* ── Add / Edit modal ── */
  function openAddModal(){
    editingId = null;
    document.getElementById('modal-edit-title').textContent='Ajouter un cours';
    document.getElementById('btn-modal-save').textContent='Ajouter';
    document.getElementById('f-title').value='';
    document.getElementById('f-desc').value='';
    document.getElementById('f-video').value='';
    document.getElementById('f-doc-cours').value='1';
    document.getElementById('f-doc-exo').value='1';
    openModal('modal-edit');
  }
  function openEditModal(id){
    editingId = id;
    const c = courses.find(x=>x.id===id);
    document.getElementById('modal-edit-title').textContent='Modifier le cours';
    document.getElementById('btn-modal-save').textContent='Enregistrer';
    document.getElementById('f-title').value=c.title;
    document.getElementById('f-desc').value=c.desc;
    document.getElementById('f-video').value=c.video;
    document.getElementById('f-doc-cours').value=c.docCours;
    document.getElementById('f-doc-exo').value=c.docExo;
    openModal('modal-edit');
  }
  function saveRow(){
    const title = document.getElementById('f-title').value.trim();
    if(!title){ showToast('Le titre est obligatoire.'); return; }
    const data = {
      title, desc:document.getElementById('f-desc').value.trim(),
      video:document.getElementById('f-video').value.trim(),
      docCours:+document.getElementById('f-doc-cours').value,
      docExo:+document.getElementById('f-doc-exo').value
    };
    if(editingId){
      const idx = courses.findIndex(x=>x.id===editingId);
      courses[idx] = {...courses[idx],...data};
      showToast('Cours modifié avec succès.');
    } else {
      data.id = nextId++;
      courses.push(data);
      showToast('Cours ajouté avec succès.');
    }
    renderRows(courses);
    closeModal('modal-edit');
  }
  function deleteRow(id){
    if(!confirm('Supprimer ce cours ?')) return;
    courses = courses.filter(x=>x.id!==id);
    renderRows(courses);
    showToast('Cours supprimé.');
  }

  /* ── Modal helpers ── */
  function openModal(id){ document.getElementById(id).classList.add('active'); document.body.style.overflow='hidden'; }
  function closeModal(id){ document.getElementById(id).classList.remove('active'); document.body.style.overflow=''; }
  function handleOvClick(e,id){ if(e.target===document.getElementById(id)){
    closeModal(id);
    if(id==='modal-video') document.getElementById('video-iframe').src='';
  }}
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){ document.querySelectorAll('.modal-overlay.active').forEach(m=>{
      if(m.id==='modal-video') document.getElementById('video-iframe').src='';
      closeModal(m.id);
    });}
  });

  /* ── Toast ── */
  let toastTimer;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
  }

  /* ── Navbar ── */
  function setPage(btn, page){
    document.querySelectorAll('.nav-btn:not(.nav-btn-accent)').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(page!=='education') window.location.href = page==='accueil'?'dashboard_admin.html':page+'.html';
  }

  /* ── Deconnect ── */
  function deconnect(){
    if(confirm('Voulez-vous vraiment vous déconnecter ?'))
      window.location.href='login.html';
  }
  </script>
</body>
</html>
