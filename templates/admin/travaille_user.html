<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digiscool - Education</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root {
      --nav-bg:  #1a1a2e;
      --accent:  #1a6bff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #BED6F3;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAVBAR */
    .ds-nav {
      background: var(--nav-bg);
      display: flex; align-items: center;
      justify-content: space-between; gap: 4px;
      padding: 0 28px; height: 66px;
      position: sticky; top: 0; z-index: 200;
      border-bottom: 2px solid rgba(255,255,255,.06);
    }
    .ds-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-right: 16px; flex-shrink: 0; margin-left: -22px; }
    .ds-logo img { height: 44px; width: auto; border-radius: 8px; object-fit: contain; }
    .ds-logo-name { font-weight: 700; font-size: 16px; color: #fff; line-height: 1.2; }
    .ds-logo-name span { display: block; font-weight: 400; font-size: 11px; color: #9ca3af; }
    .ds-nav-links { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-wrap: wrap; justify-content: flex-end; }
    .nav-btn { background: #1f2937; color: #fff; border: none; border-radius: 8px; padding: .55rem 1.4rem; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background .2s; text-decoration: none; white-space: nowrap; }
    .nav-btn:hover { background: #374151; color: #fff; }
    .nav-btn.active { background: #2563eb; }
    .nav-btn-accent { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: .55rem 1.4rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; text-decoration: none; white-space: nowrap; }
    .nav-btn-accent:hover { background: #1558d6; color: #fff; }
    .notif-link { display: flex; align-items: center; gap: 4px; text-decoration: none; color: #fff; font-size: 1.2rem; position: relative; }
    .notif-badge { display: none; background: #ef4444; color: #fff; font-size: 11px; font-weight: 700; border-radius: 999px; padding: 1px 6px; }
    .notif-badge.show { display: inline-block; }
    @media (max-width: 560px) { .ds-nav { padding: 0 12px; gap: 2px; } .nav-btn { padding: 8px 12px; font-size: 13px; } }

    /* PAGE BODY */
    .page-body {
      background-image: url('/static/components/Rectangle 18.png');
      background-size: 100% 100%;
      min-height: calc(100vh - 66px);
      padding: 32px 40px 48px;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
      margin-top: 25px;
    }

    /* SEARCH WRAP */
    .search-wrap {
      position: relative;
      display: flex; justify-content: center; align-items: center;
      width: 700px; height: 60px;
      background-image: url('/static/components/Rectangle 24.png');
      background-size: 100% 100%; background-repeat: no-repeat;
      border-radius: 0 0 10px 10px;
      margin-top: -48px; gap: 10px; padding: 20px;
    }

         /* ══════════════════════════════ BARRE RETOUR ══════════════════════════════ */
    .retour-bar {
    background: #fefeff;
  padding: 4px 9px;
  display: flex;
  justify-content: flex-start;  /* aligne le bouton à gauche */
  align-items: center;
  border-bottom: 1px solid #b0c4de;
  border-radius: 5px;
}

.btn-retour {
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.95rem;
  font-weight: 600;
  color: #1a1a2e;
  padding: 0;
}
.btn-retour:hover { color: var(--accent); }
.btn-retour svg {
  width: 20px; height: 20px;
  stroke: currentColor; fill: none; stroke-width: 2.5;
}

    /* TITRE WRAP avec avatar */
    .titre-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    /* AVATAR UTILISATEUR */
    .user-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 2px solid #4a7fb5;
      overflow: hidden;
      background: #b8d0e8;
      flex-shrink: 0;
    }
    .user-avatar img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .titre-resultat {
      background: #dce8f5;
      border-radius: 4px;
      padding: 5px 20px;
      font-size: 1rem; font-weight: 700;
      color: #1a1a2e; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      min-width: 180px;
      white-space: nowrap;
    }

    /* INPUT NOTE */
    #reg-note {
      width: 90px; height: 30px;
      background: #fff;
      border: 1px solid #b0c4de;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 0.9rem; color: #555;
      outline: none;
      flex-shrink: 0;
    }
    #reg-note:focus { border-color: var(--accent); }

    /* TABLE CARD */
    .table-card {
      width: 100%; max-width: 1100px;
      background-image: url('components/Rectangle 29.png');
      background-size: 100% 100%; background-repeat: no-repeat;
      border-radius: 12px; overflow: hidden; padding-bottom: 12px;
    }

    /* TABLE HEADER */
    .table-header { width: 100%; height: 50px; background: rgba(180,200,225,0.45); border-bottom: 2px solid #4a72b0; display: flex; align-items: center; padding: 0 16px; }
    .th-num   { width: 72px;  flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
    .th-vid   { width: 115px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
    .th-titre { width: 265px; flex-shrink: 0; display:flex; align-items:center; }
    .th-cours { width: 205px; flex-shrink: 0; display:flex; align-items:center; }
    .th-exo   { flex: 1;      display:flex; align-items:center; }
    .lbl { color: #2a4fb5; font-weight: 700; font-size: 1rem; }

    /* TABLE ROWS */
    .table-rows { display: flex; flex-direction: column; }
    .row-item { width: 100%; height: 92px; display: block; border: none; padding: 0; background: transparent; cursor: pointer; transition: filter 0.15s; }
    .row-item:hover { filter: brightness(0.95); }
    .row-item img { width: 100%; height: 100%; display: block; object-fit: fill; }

    /* ACTIONS ROW */
    .table-actions-row { display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: #e0eaf5; border-bottom: 1px solid #c5d5e8; }
    .action-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #1a6bff; }
    .btn-delete { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; }
    .btn-delete svg { width: 20px; height: 20px; stroke: #e53935; fill: none; stroke-width: 2; }
    .btn-delete:hover svg { stroke: #b71c1c; }

    /* LIGNES RÉSULTAT */
    .result-row { display: flex; align-items: center; gap: 14px; padding: 12px 18px; background: #f5f8fc; border-bottom: 1px solid #d0dcea; transition: background .15s; }
    .result-row:last-child { border-bottom: none; }
    .result-row:hover { background: #eaf1f9; }
    .row-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #1a6bff; flex-shrink: 0; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #4a7fb5; background: #b8d0e8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .avatar svg { width: 30px; height: 30px; fill: #4a7fb5; }
    .row-name { font-weight: 700; font-size: 0.97rem; color: #1a1a2e; min-width: 140px; flex-shrink: 0; }
    .row-date { flex: 1; font-size: 0.88rem; color: #6b7a8d; text-align: center; }
    .row-voir { color: #1a6bff; font-size: 0.92rem; font-weight: 600; text-decoration: none; flex-shrink: 0; min-width: 70px; text-align: right; }
    .row-voir:hover { text-decoration: underline; }
    .btn-info { background: #1a3a5e; border: none; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .btn-info:hover { background: #1a6bff; }

    /* AJOUTER */
    .btn-ajouter { background: #1976d2; color: #fff; border: none; border-radius: 10px; padding: 13px 52px; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .resultat-user {
  display: flex;
  align-items: center;
  gap: 10px; /* espace entre l’icône et le texte */
}

.icone-user {
  width: 32px;   /* taille de l’icône */
  height: 32px;
}

 </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="ds-nav">
  <a href="/dashboard/admin" class="ds-logo">
    <div class="ds-logo-box">
      <img src="{{ url_for('static', filename='image/Logo.png') }}" alt="Digiscool Logo"
           onerror="this.style.display='none'"/>
    </div>
    <div class="ds-logo-name">Digiscool</div>
  </a>
  <div class="ds-nav-links">
    <a href="/dashboard/admin" class="nav-btn">Accueil</a>
    <a href="/admin/utilisateur" class="nav-btn">Utilisateurs</a>
    <a href="/admin/education" class="nav-btn">Education</a>
    <a href="/admin/test" class="nav-btn active">Test</a>
    <a href="/admin/notifications" class="notif-link" title="Notifications">
      <span class="notif-icon">🔔</span>
      <span class="notif-badge">0</span>
    </a>
    <button class="nav-btn-accent">Déconnecté</button>
  </div>
</nav>

<!-- PAGE BODY -->
<div class="page-body">

  <!-- Search row -->
  <div class="search-wrap">

    <!-- Retour -->
    <div class="retour-bar">
      <button class="btn-retour" onclick="history.back()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Retour
      </button>
    </div>

    <!-- Bloc résultat utilisateur -->
<div class="resultat-user">
  <img src="/static/components/homme.png" alt="Icône utilisateur" class="icone-user"/>
  <div class="titre-resultat">Nom user selectionner</div>
</div>


    <!-- Input note -->
    <input type="text" id="reg-note" placeholder="Note"/>

  </div><!-- fin .search-wrap -->

  <!-- TABLE CARD -->
  <div class="table-card">
  </div>

</div><!-- fin .page-body -->

<script>
</script>

</body>
</html>
