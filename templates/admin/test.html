<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digiscool - Education</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root {
      --nav-bg:  #1a1a2e;
      --accent:  #1a6bff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #BED6F3;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══════════════════════════════ NAVBAR (dashboard) ══════════════════════════════ */
    .ds-nav {
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      padding: 0 28px;
      height: 66px;
      position: sticky;
      top: 0;
      z-index: 200;
      border-bottom: 2px solid rgba(255,255,255,.06);
    }

    .ds-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-right: 16px;
      flex-shrink: 0;
      margin-left: -22px;
    }
    .ds-logo img {
      height: 44px;
      width: auto;
      border-radius: 8px;
      object-fit: contain;
    }
    .ds-logo-name {
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      line-height: 1.2;
    }
    .ds-logo-name span {
      display: block;
      font-weight: 400;
      font-size: 11px;
      color: #9ca3af;
    }

    .ds-nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .nav-btn {
      background: #1f2937;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .55rem 1.4rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-btn:hover { background: #374151; color: #fff; }
    .nav-btn.active { background: #2563eb; }

    .nav-btn-accent {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .55rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-btn-accent:hover { background: #1558d6; color: #fff; }

    .notif-link {
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: #fff;
      font-size: 1.2rem;
      position: relative;
    }
    .notif-badge {
      display: none;
      background: #ef4444;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      padding: 1px 6px;
    }
    .notif-badge.show { display: inline-block; }

    @media (max-width: 560px) {
      .ds-nav  { padding: 0 12px; gap: 2px; }
      .nav-btn { padding: 8px 12px; font-size: 13px; }
    }

    /* ══════════════════════════════ PAGE BODY ══════════════════════════════ */
    .page-body {
      background-image: url('/static/components/Rectangle 18.png');
      background-size: 100% 100%;
      min-height: calc(100vh - 66px);
      padding: 32px 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: 25px;
    }

    /* ══════════════════════════════ SEARCH ROW ══════════════════════════════ */
    .search-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 600px;
      height: 45px;
      background-image: url('/static/components/Rectangle 24.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      border-radius: 0 0 10px 10px;
      margin-top: -48px;
      gap: 10px;
    }

    .search-case {
      position: relative;
      width: 400px;
      height: 30px;
      background-image: url('/static/components/Rectangle 27.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      border-radius: 8px;
      display: flex; align-items: center;
      padding-left: 12px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      display: flex; align-items: center;
      height: 100%;
      pointer-events: none;
    }
    .search-icon svg { width: 18px; height: 18px; stroke: #666; fill: none; stroke-width: 2; }

    .search-wrap input {
      flex: 1;
      height: 30px;
      border: none; outline: none;
      background: transparent;
      font-size: 0.9rem; color: #555;
    }

    /* ══════════════════════════════ TRIER PAR ══════════════════════════════ */
    .btn-trier {
      width: 139px;
      height: 28px;
      background-image: url('/static/components/TRIER_PAR.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      border: none;
      background-color: #f5fbf9;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 0 10px 0 12px;
      position: relative;
      gap: 4px;
      border-radius: 5px;
      border: 1px blue solid;
    }

    .select-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      flex: 1;
      height: 100%;
    }

    .sort-select {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.82rem;
      font-weight: 600;
      color: #111;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-left: 4px;
      padding-right: 28px;
      z-index: 2;
    }

    .sort-select option {
      background: #fff;
      color: #111;
      font-size: 0.9rem;
    }

    .arrow-icon {
      position: absolute;
      right: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    .arrow-icon svg {
      width: 24px;
      height: 24px;
      fill: #111;
      display: block;
    }

    /* ══════════════════════════════ TABLE HEADER ══════════════════════════════ */
    .table-header {
      width: 100%;
      height: 50px;
      background: rgba(180,200,225,0.45);
      border-bottom: 2px solid #4a72b0;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }
    .th-num   { width: 72px;  flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
    .th-vid   { width: 115px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
    .th-titre { width: 265px; flex-shrink: 0; display:flex; align-items:center; }
    .th-cours { width: 205px; flex-shrink: 0; display:flex; align-items:center; }
    .th-exo   { flex: 1;      display:flex; align-items:center; }
    .th-num img, .th-vid img, .th-titre img { display:block; }
    .lbl { color: #2a4fb5; font-weight: 700; font-size: 1rem; }

    /* ══════════════════════════════ TABLE ROWS ══════════════════════════════ */
    .table-rows { display: flex; flex-direction: column; }
    .row-item {
      width: 100%; height: 92px;
      display: block; border: none; padding: 0;
      background: transparent; cursor: pointer;
      transition: filter 0.15s;
    }
    .row-item:hover { filter: brightness(0.95); }
    .row-item img { width: 100%; height: 100%; display: block; object-fit: fill; }

    /* ══════════════════════════════ TABLE CARD ══════════════════════════════ */
    .table-card {
      width: 100%; max-width: 1100px;
      background-image: url('components/Rectangle 29.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      border-radius: 12px;
      overflow: hidden;
      padding-bottom: 12px;
    }
    .btn-resultat {
      height: 30px;
      background: #043C70;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .btn-resultat:hover { opacity: .85; }

    /* Bouton Envoyer */
    .btn-envoyer {
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      height: 30px;
      padding: 0 40px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: auto;
      align-self: center;
    }
    .btn-envoyer:hover { background: #1565c0; }

    /* ══════════════════════════════ AJOUTER BUTTON ══════════════════════════════ */
    .btn-ajouter {
      background: #1976d2; color: #fff;
      border: none; border-radius: 10px;
      padding: 13px 52px;
      font-size: 1.05rem; font-weight: 700;
      cursor: pointer; margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- NAVBAR (dashboard) -->
<nav class="ds-nav">
  <a href="#" class="ds-logo">
    <img src="../static/image/Logo.png" alt="Digiscool logo"
         onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex'">
    <div id="logo-fallback"
         style="display:none;width:44px;height:44px;border-radius:9px;
                background:linear-gradient(135deg,#a855f7,#3b82f6);
                align-items:center;justify-content:center;
                font-weight:800;font-size:17px;color:#fff;">DS</div>
    <div class="ds-logo-name">Digiscool</div>
  </a>
  <div class="ds-nav-links">
    <a href="/dashboard/admin" class="nav-btn">Accueil</a>
    <a href="/admin/utilisateur" class="nav-btn">Utilisateurs</a>
    <a href="/admin/education" class="nav-btn">Education</a>
    <a href="/admin/test" class="nav-btn active">Test</a>
    <a href="/admin/notifications" class="notif-link" title="Notifications">
      <span class="notif-icon">🔔</span>
      <span class="notif-badge">0</span>
    </a>
    <button class="nav-btn-accent">Déconnecté</button>
  </div>
</nav>

<!-- PAGE BODY -->
<div class="page-body">

  <!-- Search row -->
  <div class="search-wrap">
    <div class="search-case"> 
      <div class="select-wrapper">
        <select class="sort-select" id="sort-select" onchange="loadCours()">
          <option value="id" class="select_indice">Selectionner</option>    
          <option value="num">Trier par N°</option>
          <option value="titre">Trier par Titre</option>
          <option value="matiere">Trier par Matière</option>
          <option value="created_at">Trier par Date</option>
        </select>
        <span class="arrow-icon">
          <svg viewBox="0 0 24 24">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </span>
      </div>
    </div>
    <button class="btn-resultat" onclick="window.location.href='/admin/test/resultats'">Résultat</button>
  </div> <!-- fin .search-wrap -->

  <!-- ════ TABLE CARD ════ -->
  <div class="table-card"> </div>
    <!-- ════ BOUTON ENVOYER ════ -->
  <button class="btn-envoyer">Envoyer</button>
</div><!-- fin .page-body -->
<script>
 /*
  function showResultats() {
    window.location.href = 'resultats.html';
  }*/

</script>
</body>
</html>
