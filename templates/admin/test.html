{% extends "admin/dashboard.html" %}
{% set active_page = 'test' %}

{% block title %}Digiscool - Test{% endblock %}

{% block extra_head %}
<style>
  body {
    background: #BED6F3;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══════════════════════════════ SEARCH ROW ══════════════════════════════ */
  .search-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 600px;
    height: 45px;
    background-image: url('/static/components/Rectangle 24.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    border-radius: 0 0 10px 10px;
    margin-top: -48px;
    gap: 10px;
  }

  .search-case {
    position: relative;
    width: 400px;
    height: 30px;
    background-image: url('/static/components/Rectangle 27.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    border-radius: 8px;
    display: flex; align-items: center;
    padding-left: 12px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    display: flex; align-items: center;
    height: 100%;
    pointer-events: none;
  }
  .search-icon svg { width: 18px; height: 18px; stroke: #666; fill: none; stroke-width: 2; }

  .search-wrap input {
    flex: 1;
    height: 30px;
    border: none; outline: none;
    background: transparent;
    font-size: 0.9rem; color: #555;
  }

  /* ══════════════════════════════ TRIER PAR ══════════════════════════════ */
  .btn-trier {
    width: 139px;
    height: 28px;
    background-image: url('/static/components/TRIER_PAR.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    border: none;
    background-color: #f5fbf9;
    cursor: pointer;
    display: flex;
    align-items: center;
    padding: 0 10px 0 12px;
    position: relative;
    gap: 4px;
    border-radius: 5px;
    border: 1px blue solid;
  }

  .select-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    flex: 1;
    height: 100%;
  }

  .sort-select {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-size: 0.82rem;
    font-weight: 600;
    color: #111;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    padding-left: 4px;
    padding-right: 28px;
    z-index: 2;
  }

  .sort-select option {
    background: #fff;
    color: #111;
    font-size: 0.9rem;
  }

  .arrow-icon {
    position: absolute;
    right: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 1;
  }
  .arrow-icon svg {
    width: 24px;
    height: 24px;
    fill: #111;
    display: block;
  }

  /* ══════════════════════════════ TABLE HEADER ══════════════════════════════ */
  .table-header {
    width: 100%;
    height: 50px;
    background: rgba(180,200,225,0.45);
    border-bottom: 2px solid #4a72b0;
    display: flex;
    align-items: center;
    padding: 0 16px;
  }
  .th-num   { width: 72px;  flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
  .th-vid   { width: 115px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
  .th-titre { width: 265px; flex-shrink: 0; display:flex; align-items:center; }
  .th-cours { width: 205px; flex-shrink: 0; display:flex; align-items:center; }
  .th-exo   { flex: 1;      display:flex; align-items:center; }
  .th-num img, .th-vid img, .th-titre img { display:block; }
  .lbl { color: #2a4fb5; font-weight: 700; font-size: 1rem; }

  /* ══════════════════════════════ TABLE ROWS ══════════════════════════════ */
  .table-rows { display: flex; flex-direction: column; }
  .row-item {
    width: 100%; height: 92px;
    display: block; border: none; padding: 0;
    background: transparent; cursor: pointer;
    transition: filter 0.15s;
  }
  .row-item:hover { filter: brightness(0.95); }
  .row-item img { width: 100%; height: 100%; display: block; object-fit: fill; }

  /* ══════════════════════════════ TABLE CARD ══════════════════════════════ */
  .table-card {
    width: 100%; max-width: 1100px;
    background-image: url('components/Rectangle 29.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    border-radius: 12px;
    overflow: hidden;
    padding-bottom: 12px;
  }
  .btn-resultat {
    height: 30px;
    background: #043C70;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 32px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: opacity .15s;
    flex-shrink: 0;
  }
  .btn-resultat:hover { opacity: .85; }

  /* Bouton Envoyer */
  .btn-envoyer {
    background: #1976d2;
    color: #fff;
    border: none;
    border-radius: 6px;
    height: 30px;
    padding: 0 40px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: auto;
    align-self: center;
  }
  .btn-envoyer:hover { background: #1565c0; }

  /* ══════════════════════════════ AJOUTER BUTTON ══════════════════════════════ */
  .btn-ajouter {
    background: #1976d2; color: #fff;
    border: none; border-radius: 10px;
    padding: 13px 52px;
    font-size: 1.05rem; font-weight: 700;
    cursor: pointer; margin-top: 8px;
  }

  /* ══════════════════════════════ PAGE BODY (spécifique à cette page) ══════════════════════════════ */
  .page-body {
    background-image: url('/static/components/Rectangle 18.png');
    background-size: 100% 100%;
    min-height: calc(100vh - 66px);
    padding: 32px 40px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-top: 25px;
  }
</style>
{% endblock %}

{% block content %}
<!-- PAGE BODY -->
<div class="page-body">

  <!-- Search row -->
  <div class="search-wrap">
    <div class="search-case">
      <div class="select-wrapper">
        <select class="sort-select" id="sort-select" onchange="loadCours()">
          <option value="id" class="select_indice">Selectionner</option>
          <option value="num">Trier par N°</option>
          <option value="titre">Trier par Titre</option>
          <option value="matiere">Trier par Matière</option>
          <option value="created_at">Trier par Date</option>
        </select>
        <span class="arrow-icon">
          <svg viewBox="0 0 24 24">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </span>
      </div>
    </div>
    <button class="btn-resultat" onclick="window.location.href='/admin/test/resultats'">Résultat</button>
  </div> <!-- fin .search-wrap -->

  <!-- ════ TABLE CARD ════ -->
  <div class="table-card"> </div>
    <!-- ════ BOUTON ENVOYER ════ -->
  <button class="btn-envoyer">Envoyer</button>
</div><!-- fin .page-body -->
{% endblock %}

{% block extra_js %}
<script>

  function showResultats() {
    window.location.href = 'resultats.html';
  }*/

</script>
{% endblock %}
