{% extends "admin/dashboard.html" %}
{% set active_page = 'test' %}

{% block title %}Digiscool - Résultats{% endblock %}

{% block extra_head %}
<style>
  body {
    background: #BED6F3;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══════════════════════════════ PAGE BODY ══════════════════════════════ */
  .page-body {
    background-image: url('/static/components/Rectangle 18.png');
    background-size: 100% 100%;
    min-height: calc(100vh - 66px);
    padding: 32px 40px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-top: 25px;
  }

  /* ══════════════════════════════ SEARCH ROW ══════════════════════════════ */
  .search-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 600px;
    height: 45px;
    background-image: url('/static/components/Rectangle 24.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    border-radius: 0 0 10px 10px;
    margin-top: -48px;
    gap: 10px;
    padding: 20px;
  }

  /* ══════════════════════════════ BARRE RETOUR ══════════════════════════════ */
  .retour-bar {
    width: 16%;
    background: #fefeff;
    padding: 4px 9px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #b0c4de;
    border-radius: 5px;
  }
  .btn-retour {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #1a1a2e;
    padding: 0;
    align-self: flex-start;
  }
  .btn-retour:hover { color: var(--accent); }
  .btn-retour svg {
    width: 20px; height: 20px;
    stroke: currentColor; fill: none; stroke-width: 2.5;
  }

  /* ══════════════════════════════ TABLE HEADER ══════════════════════════════ */
  .table-header {
    width: 100%;
    height: 50px;
    background: rgba(180,200,225,0.45);
    border-bottom: 2px solid #4a72b0;
    display: flex;
    align-items: center;
    padding: 0 16px;
  }
  .th-num   { width: 72px;  flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
  .th-vid   { width: 115px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
  .th-titre { width: 265px; flex-shrink: 0; display:flex; align-items:center; }
  .th-cours { width: 205px; flex-shrink: 0; display:flex; align-items:center; }
  .th-exo   { flex: 1;      display:flex; align-items:center; }
  .th-num img, .th-vid img, .th-titre img { display:block; }
  .lbl { color: #2a4fb5; font-weight: 700; font-size: 1rem; }

  /* ══════════════════════════════ TABLE ROWS ══════════════════════════════ */
  .table-rows { display: flex; flex-direction: column; }
  .row-item {
    width: 100%; height: 92px;
    display: block; border: none; padding: 0;
    background: transparent; cursor: pointer;
    transition: filter 0.15s;
  }
  .row-item:hover { filter: brightness(0.95); }
  .row-item img { width: 100%; height: 100%; display: block; object-fit: fill; }

  /* ══════════════════════════════ TITRE RÉSULTAT ══════════════════════════════ */
  .titre-wrap {
    width: 100%;
    max-width: 960px;
    margin: 22px auto 18px;
    display: flex;
    justify-content: center;
  }
  .titre-resultat {
    background: #dce8f5;
    border-radius: 8px;
    padding: 4px 80px;
    font-size: 1.15rem;
    font-weight: 700;
    color: #1a1a2e;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    min-width: 320px;
    margin-bottom: 8px;
  }

  /* ══════════════════════════════ TABLE CARD ══════════════════════════════ */
  .table-card {
    width: 100%; max-width: 1100px;
    background-image: url('components/Rectangle 29.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    border-radius: 12px;
    overflow: hidden;
    padding-bottom: 12px;
  }

  /* ══════════════════════════════ AJOUTER BUTTON ══════════════════════════════ */
  .btn-ajouter {
    background: #1976d2; color: #fff;
    border: none; border-radius: 10px;
    padding: 13px 52px;
    font-size: 1.05rem; font-weight: 700;
    cursor: pointer; margin-top: 8px;
  }

  /* En-tête actions (checkbox + corbeille) */
  .table-actions-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    background: #e0eaf5;
    border-bottom: 1px solid #c5d5e8;
  }
  .action-checkbox {
    width: 18px; height: 18px;
    cursor: pointer; accent-color: #1a6bff;
  }
  .btn-delete {
    background: none; border: none;
    cursor: pointer; padding: 4px;
    display: flex; align-items: center;
  }
  .btn-delete svg {
    width: 20px; height: 20px;
    stroke: #e53935; fill: none; stroke-width: 2;
  }
  .btn-delete:hover svg { stroke: #b71c1c; }

  /* Lignes résultat */
  .result-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    background: #f5f8fc;
    border-bottom: 1px solid #d0dcea;
    transition: background .15s;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row:hover { background: #eaf1f9; }

  .row-checkbox {
    width: 18px; height: 18px;
    cursor: pointer; accent-color: #1a6bff;
    flex-shrink: 0;
  }

  /* Avatar */
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid #4a7fb5;
    background: #b8d0e8;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .avatar svg {
    width: 30px; height: 30px;
    fill: #4a7fb5;
  }

  /* Nom */
  .row-name {
    font-weight: 700;
    font-size: 0.97rem;
    color: #1a1a2e;
    min-width: 140px;
    flex-shrink: 0;
  }

  /* Date */
  .row-date {
    flex: 1;
    font-size: 0.88rem;
    color: #6b7a8d;
    text-align: center;
  }

  /* Lien Voire */
  .row-voir {
    color: #1a6bff;
    font-size: 0.92rem;
    font-weight: 600;
    text-decoration: none;
    flex-shrink: 0;
    min-width: 70px;
    text-align: right;
  }
  .row-voir:hover { text-decoration: underline; }

  /* Icône info */
  .btn-info {
    background: #1a3a5e;
    border: none; border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .btn-info svg {
    width: 14px; height: 14px;
    fill: #fff;
  }
  .btn-info:hover { background: #1a6bff; }
</style>
{% endblock %}

{% block content %}
<!-- PAGE BODY -->
<div class="page-body">

  <!-- Search row -->
  <div class="search-wrap">

    <div class="retour-bar" style="width:16%;">
      <button class="btn-retour" onclick="history.back()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Retour
      </button>
    </div>
    <div class="titre-wrap">
      <div class="titre-resultat">Résultat</div>
    </div>

  </div> <!-- fin .search-wrap -->

  <!-- ════ TABLE CARD ════ -->
  <div class="table-card">

    <!-- Ligne actions (checkbox global + corbeille) -->
    <div class="table-actions-row">
      <input type="checkbox" class="action-checkbox" id="select-all" onchange="toggleAll(this)">
      <button class="btn-delete" title="Supprimer la sélection">
        <svg viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>

    <!-- Lignes dynamiques -->
    <div id="result-list"></div>

  </div>

  <!-- ════ BOUTON ENVOYER ════ -->
</div><!-- fin .page-body -->
{% endblock %}

{% block extra_js %}
<script>
  /* Données simulées */
  const resultats = [
    { nom: "BOBY Tsara", date: "30 - 05 - 2026/ 2h:50" },
    { nom: "BOBY Tsara", date: "30 - 05 - 2026/ 2h:50" },
    { nom: "BOBY Tsara", date: "30 - 05 - 2026/ 2h:50" },
    { nom: "BOBY Tsara", date: "" },
    { nom: "BOBY Tsara", date: "" },
    { nom: "BOBY Tsara", date: "" },
    { nom: "BOBY Tsara", date: "" },
    { nom: "BOBY Tsara", date: "" },
  ];

  /* Icône avatar SVG */
  const avatarSVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="8" r="4" fill="#4a7fb5"/>
    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="#4a7fb5"/>
  </svg>`;

  /* Icône info SVG */
  const infoSVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="10" fill="#1a3a5e"/>
    <line x1="12" y1="8" x2="12" y2="8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="11" x2="12" y2="17" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </svg>`;

  function renderList() {
    const container = document.getElementById('result-list');
    container.innerHTML = resultats.map((r, i) => `
      <div class="result-row">
        <input type="checkbox" class="row-checkbox" data-index="${i}">
        <div class="avatar">${avatarSVG}</div>
        <div class="row-name">${r.nom}</div>
        <div class="row-date">${r.date ? 'Date: ' + r.date : ''}</div>
        <a href="/admin/test/travaille_user" class="row-voir">Voire...</a>
        <button class="btn-info" title="Informations">${infoSVG}</button>
      </div>
    `).join('');
  }

  function toggleAll(master) {
    document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = master.checked);
  }
  renderList();
</script>
{% endblock %}
