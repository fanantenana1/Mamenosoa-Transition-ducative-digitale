<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digiscool - Test</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root {
      --bg:          #b8c8e8;
      --nav-bg:      #1a1a2e;
      --accent:      #1a6bff;
      --card-bg:     #ffffff;
      --card-shadow: 0 4px 20px rgba(0,0,0,.13);
      --radius:      18px;
      --font-ui:     'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background-color: var(--bg);
      background-image: url('../static/image/molecule.png');
      background-repeat: no-repeat;
      background-position: center 160px;
      background-size: 520px auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── molecule_bas ── */
    body::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0;
      width: 280px; height: 280px;
      background: url('../static/image/molecule_bas.png') no-repeat left bottom / contain;
      pointer-events: none;
      z-index: 0;
    }

    /* ────────── NAVBAR (identique dashboard) ────────── */
    .ds-nav {
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      padding: 0 28px;
      height: 66px;
      position: sticky;
      top: 0;
      z-index: 200;
      border-bottom: 2px solid rgba(255,255,255,.06);
    }

    .ds-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-right: 16px;
      flex-shrink: 0;
      margin-left: -22px;
    }
    .ds-logo img {
      height: 44px;
      width: auto;
      border-radius: 8px;
      object-fit: contain;
    }
    .ds-logo-name {
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      line-height: 1.2;
    }
    .ds-logo-name span {
      display: block;
      font-weight: 400;
      font-size: 11px;
      color: #9ca3af;
    }

    .ds-nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .nav-btn {
      background: #1f2937;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .55rem 1.4rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-btn:hover { background: #374151; color: #fff; }
    .nav-btn.active { background: #2563eb; }

    .nav-btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .55rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-btn-primary:hover { background: #1558d6; color: #fff; }

    .nav-btn-accent {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .nav-btn-accent:hover { background: #1558d6; }

    /* notif bell */
    .notif-link {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #1f2937;
      text-decoration: none;
      transition: background .2s;
    }
    .notif-link:hover { background: #374151; }
    .notif-icon { font-size: 1.15rem; line-height: 1; }
    .notif-badge {
      position: absolute; top: -4px; right: -4px;
      min-width: 18px; height: 18px;
      border-radius: 50%; background: #dc2626; color: #fff;
      font-size: .68rem; font-weight: 700;
      display: none; align-items: center; justify-content: center;
      padding: 0 4px; line-height: 1;
    }
    .notif-badge.show { display: flex; }
    .notif-link.has-alert { box-shadow: 0 0 0 2px rgba(220,38,38,.5); }

    /* ════════════════════════════════ PAGE BODY ════════════════════════════════ */
    .page-body {
      background-image: url('/static/components/Rectangle 18.png');
      background-size: 100% 100%;
      min-height: calc(100vh - 66px);
      padding: 32px 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: 25px;
      position: relative;
      z-index: 2;
    }

    /* ════════════════════════════════ TYPE TOOLBAR ════════════════════════════════ */
    .search-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 600px;
      height: 45px;
      background-image: url('/static/components/Rectangle 24.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      border-radius: 0 0 10px 10px;
      margin-top: -48px;
      gap: 10px;
    }

    .search-case {
      position: relative;
      width: 400px;
      height: 30px;
      background-image: url('/static/components/Rectangle 27.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      border-radius: 8px;
      display: flex; align-items: center;
      padding-left: 12px;
    }

    .sort-select {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.82rem;
      font-weight: 600;
      color: #111;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }
    .sort-select option { background: #fff; color: #111; font-size: 0.9rem; }

    .arrow-icon {
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; pointer-events: none;
    }
    .arrow-icon svg { width: 30px; height: 40px; fill: #111; display: block; }

    /* ════════════════════════════════ BOUTON RÉSULTAT ════════════════════════════════ */
    .btn-resultat {
      height: 30px;
      background: #043C70;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .btn-resultat:hover { opacity: .85; }

    /* ════════════════════════════════ TABLE CARD ════════════════════════════════ */
    .table-card {
      width: 100%; max-width: 1100px;
      background-image: url('/static/components/Rectangle 29.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      border-radius: 12px;
      overflow: hidden;
      padding-bottom: 12px;
      min-height: 500px;
    }

    /* Questions QCM */
    .qcm-wrap { padding: 28px 36px; display: flex; flex-direction: column; gap: 18px; }
    .qcm-item { background: #f8fafc; border-radius: 12px; padding: 1.1rem 1.3rem; }
    .qcm-item p { font-weight: 700; font-size: .97rem; color: #1a1a2e; margin-bottom: .7rem; }
    .qcm-option {
      display: flex; align-items: center; gap: .6rem;
      font-size: .93rem; cursor: pointer;
      padding: .32rem .5rem; border-radius: 7px; transition: background .15s;
    }
    .qcm-option:hover { background: #eef2ff; }
    .qcm-option input[type=radio] { width: 15px; height: 15px; flex-shrink: 0; }

    .test-placeholder {
      padding: 3rem;
      text-align: center;
      color: #64748b;
      font-size: 1rem;
    }

    /* ════════════════════════════════ BOUTON ENVOYER ════════════════════════════════ */
    .btn-envoyer {
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      height: 30px;
      padding: 0 40px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      align-self: center;
      font-family: inherit;
      transition: background .15s;
    }
    .btn-envoyer:hover { background: #1565c0; }
    .btn-envoyer:disabled { background: #94a3b8; cursor: not-allowed; }

    /* TABLE HEADER / ROWS (conservés) */
    .table-header {
      width: 100%; height: 50px;
      background: rgba(180,200,225,0.45);
      border-bottom: 2px solid #4a72b0;
      display: flex; align-items: center; padding: 0 16px;
    }
    .th-num   { width: 72px;  flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
    .th-vid   { width: 115px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
    .th-titre { width: 265px; flex-shrink: 0; display:flex; align-items:center; }
    .th-cours { width: 205px; flex-shrink: 0; display:flex; align-items:center; }
    .th-exo   { flex: 1; display:flex; align-items:center; }
    .lbl { color: #2a4fb5; font-weight: 700; font-size: 1rem; }

    .table-rows { display: flex; flex-direction: column; }
    .row-item {
      width: 100%; height: 92px; display: block; border: none; padding: 0;
      background: transparent; cursor: pointer; transition: filter 0.15s;
    }
    .row-item:hover { filter: brightness(0.95); }
    .row-item img { width: 100%; height: 100%; display: block; object-fit: fill; }

    .btn-ajouter {
      background: #1976d2; color: #fff; border: none; border-radius: 10px;
      padding: 13px 52px; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; margin-top: 8px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .search-wrap { width: 98%; }
      .search-case { width: 60%; }
      .page-body { padding: 16px 10px 40px; }
      .ds-nav { padding: 0 12px; }
      .nav-btn { padding: 8px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <!-- ── NAVBAR (identique dashboard) ── -->
  <nav class="ds-nav">
    <a href="/admin/dashboard" class="ds-logo">
      <img src="../static/image/Logo.png" alt="Digiscool logo"
           onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex'">
      <div id="logo-fallback"
           style="display:none;width:44px;height:44px;border-radius:9px;
                  background:linear-gradient(135deg,#a855f7,#3b82f6);
                  align-items:center;justify-content:center;
                  font-weight:800;font-size:17px;color:#fff;">DS</div>
      <div class="ds-logo-name">Digiscool</div>
    </a>
    <div class="ds-nav-links">
      <a href="/admin/dashboard" class="nav-btn">Accueil</a>
      <a href="/admin/utilisateurs" class="nav-btn">Utilisateurs</a>
      <a href="/admin/education" class="nav-btn">Education</a>
      <a href="/admin/test" class="nav-btn active">Test</a>
      <a href="/admin/notifications" class="notif-link{% if notif_count > 0 %} has-alert{% endif %}" title="Notifications">
        <span class="notif-icon">🔔</span>
        <span class="notif-badge{% if notif_count > 0 %} show{% endif %}">{{ notif_count }}</span>
      </a>
      <a href="/logout" class="nav-btn nav-btn-accent">Déconnecté</a>
    </div>
  </nav>

  <!-- ── PAGE BODY ── -->
  <div class="page-body">

    <!-- Select Type + Bouton Résultat -->
    <div class="search-wrap">
      <div class="search-case">
        <select class="sort-select" id="sort-select" onchange="loadTest()">
          <option value="" selected disabled hidden>Type.....</option>
        </select>
        <span class="arrow-icon">
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </span>
      </div>
      <button class="btn-resultat" onclick="window.location.href='/admin/test/resultats'">Résultat</button>
    </div>

    <!-- Table Card (contenu QCM dynamique) -->
    <div class="table-card" id="test-card-content">
      <div class="test-placeholder">Sélectionnez un type de test pour afficher les questions.</div>
    </div>

    <!-- Bouton Envoyer -->
    <button class="btn-envoyer" id="btn-envoyer" onclick="envoyerTest()" disabled>Envoyer</button>

  </div><!-- fin .page-body -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script>
    let allCours = [];
    let currentQuestions = [];
    let currentMeta = null;

    /* ── Charge la liste des cours → remplit le select ── */
    async function loadTypes() {
      try {
        const r = await fetch('/api/cours');
        if (!r.ok) throw new Error('Erreur serveur');
        allCours = await r.json();

        const select = document.getElementById('sort-select');
        allCours.forEach(c => {
          const hasCoursQcm = c.cours_type === 'qcm' && hasJsonItems(c.cours_qcm);
          const hasExoQcm   = c.exercice_type === 'qcm' && hasJsonItems(c.exercice_qcm);
          if (hasCoursQcm) {
            const opt = document.createElement('option');
            opt.value = `${c.id}:cours`;
            opt.textContent = `${c.titre} — Cours`;
            select.appendChild(opt);
          }
          if (hasExoQcm) {
            const opt = document.createElement('option');
            opt.value = `${c.id}:exercice`;
            opt.textContent = `${c.titre} — Exercice`;
            select.appendChild(opt);
          }
        });
      } catch (e) { console.error(e); }
    }

    function hasJsonItems(val) {
      if (!val) return false;
      try { const a = JSON.parse(val); return Array.isArray(a) && a.length > 0; }
      catch (e) { return false; }
    }

    /* ── Affiche les questions du type sélectionné ── */
    function loadTest() {
      const val = document.getElementById('sort-select').value;
      const card = document.getElementById('test-card-content');
      const btn  = document.getElementById('btn-envoyer');

      if (!val) {
        card.innerHTML = '<div class="test-placeholder">Sélectionnez un type de test pour afficher les questions.</div>';
        btn.disabled = true;
        currentQuestions = [];
        return;
      }

      const [id, kind] = val.split(':');
      const c = allCours.find(x => x.id == id);
      if (!c) return;

      const qcmRaw = kind === 'cours' ? c.cours_qcm : c.exercice_qcm;
      let questions = [];
      try { questions = JSON.parse(qcmRaw || '[]'); } catch (e) { questions = []; }

      currentQuestions = questions;
      currentMeta = { id: c.id, titre: c.titre, kind };

      if (!questions.length) {
        card.innerHTML = '<div class="test-placeholder">Aucune question disponible pour ce type.</div>';
        btn.disabled = true;
        return;
      }

      card.innerHTML = `<div class="qcm-wrap">
        ${questions.map((q, i) => `
          <div class="qcm-item">
            <p>${i+1}. ${escHtml(q.question || '')}</p>
            ${(q.options || []).map((o, j) => `
              <label class="qcm-option">
                <input type="radio" name="q${i}" value="${j}"/>
                ${escHtml(o)}
              </label>`).join('')}
          </div>`).join('')}
      </div>`;

      btn.disabled = false;
    }

    /* ── Soumettre ── */
    function envoyerTest() {
      if (!currentQuestions.length) return;
      let answered = 0, correct = 0;
      currentQuestions.forEach((q, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if (sel) { answered++; if (parseInt(sel.value) === q.correct) correct++; }
      });
      if (answered < currentQuestions.length) {
        alert(`Veuillez répondre à toutes les questions (${answered}/${currentQuestions.length} répondues).`);
        return;
      }
      alert(`✅ Résultat : ${correct} / ${currentQuestions.length} bonnes réponses`);
    }

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('DOMContentLoaded', loadTypes);
  </script>
</body>
</html>
